<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Recipe Book — Onmenu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FAF7F2;
      color: #2C1810;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(44,24,16,0.10);
    }
    .logo-mark {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #A8512D, #C4623A);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .logo-mark svg { width: 28px; height: 28px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
    p { font-size: 15px; color: #6B5744; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #C4623A;
      color: #fff;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      width: 100%;
      justify-content: center;
    }
    .btn-secondary {
      background: #fff;
      color: #2C1810;
      border: 1px solid #E8DDD0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
        <path d="M4 6h16M4 12h10M4 18h7"/>
      </svg>
    </div>
    <h1>You've been invited!</h1>
    <p>Open Onmenu to join the shared recipe book. You'll need the app installed to accept this invite.</p>
    <a id="open-app" href="#" class="btn">Open in Onmenu</a>
    <a href="https://apps.apple.com/app/onmenu/id0" class="btn btn-secondary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      Get Onmenu on the App Store
    </a>
  </div>
  <script>
    // Extract the invite code from the path: /join/CODE
    const parts = window.location.pathname.split('/');
    const code = parts[parts.length - 1];
    if (code) {
      document.getElementById('open-app').href = 'onmenu://join/' + code;
    }
  </script>
</body>
</html>
